name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check all modules import cleanly
        run: |
          python -c "
          import importlib
          import pathlib
          modules = [
              f'lib.{p.stem}' for p in sorted(pathlib.Path('lib').glob('*.py'))
              if p.stem != '__init__'
          ]
          for m in modules:
              importlib.import_module(m)
              print(f'OK {m}')
          "
      - name: Compile check
        run: python -m py_compile brain.py lib/*.py
