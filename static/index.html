<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bookmark Brain</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --panel-2: #1c2030;
    --border: #262b3a;
    --text: #e7eaf0;
    --muted: #8c93a4;
    --accent: #82b1ff;
    --accent-2: #b388ff;
    --tag-bg: #232838;
    --ok: #6fcf97;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.5;
  }
  .container { max-width: 880px; margin: 0 auto; padding: 32px 24px 96px; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
  header h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  header .stats { font-size: 13px; color: var(--muted); }
  .ask-form { position: sticky; top: 0; background: var(--bg); padding: 12px 0 16px; z-index: 10; }
  .ask-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    font-family: inherit;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.15s;
  }
  .ask-input:focus { border-color: var(--accent); }
  .ask-row { display: flex; gap: 12px; align-items: center; margin-top: 8px; }
  .ask-button {
    background: var(--accent);
    color: #0c1422;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .ask-button:disabled { opacity: 0.5; cursor: not-allowed; }
  .archive-toggle { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .answer-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    margin-bottom: 20px;
    white-space: pre-wrap;
  }
  .answer-meta { font-size: 12px; color: var(--muted); margin-top: 12px; }
  .citations h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; margin: 24px 0 12px; }
  .card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card-title { display: flex; align-items: baseline; gap: 8px; font-size: 15px; }
  .card-title a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .card-title a:hover { text-decoration: underline; }
  .card-id { color: var(--muted); font-size: 12px; }
  .card-summary { color: var(--text); font-size: 14px; margin: 6px 0 0; }
  .card-why { color: var(--muted); font-size: 13px; margin-top: 6px; font-style: italic; }
  .card-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 8px; font-size: 12px; color: var(--muted); }
  .card-meta a.url { color: var(--muted); text-decoration: none; }
  .tag { background: var(--tag-bg); border-radius: 4px; padding: 2px 8px; color: var(--text); font-size: 12px; }
  .archived-badge { background: #5a3232; color: #ffb0b0; border-radius: 4px; padding: 2px 6px; font-size: 11px; }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }
  .loading { color: var(--muted); padding: 24px 0; text-align: center; }
  .examples { color: var(--muted); font-size: 13px; }
  .examples button {
    background: none; border: 1px dashed var(--border); color: var(--muted);
    padding: 4px 10px; margin: 4px 4px 0 0; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .examples button:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Bookmark Brain</h1>
    <div class="stats" id="stats">…</div>
  </header>

  <form class="ask-form" id="ask-form">
    <textarea id="question" class="ask-input" placeholder="Ask anything about your bookmarks. e.g. 'What did I save about RAG?' or 'Recipes I bookmarked but never tried.'"></textarea>
    <div class="ask-row">
      <button class="ask-button" type="submit" id="submit-btn">Ask</button>
      <label class="archive-toggle">
        <input type="checkbox" id="include-archived" />
        include archived
      </label>
    </div>
  </form>

  <div id="examples" class="examples" style="margin-bottom: 16px;">
    Try:
    <button onclick="useExample(this)">What's actually in my Misc folder?</button>
    <button onclick="useExample(this)">Best productivity tools I've saved</button>
    <button onclick="useExample(this)">Anything about machine learning?</button>
    <button onclick="useExample(this)">GitHub repos worth revisiting</button>
  </div>

  <div id="result"></div>
</div>

<script>
const form = document.getElementById('ask-form');
const questionEl = document.getElementById('question');
const submitBtn = document.getElementById('submit-btn');
const includeArchivedEl = document.getElementById('include-archived');
const resultEl = document.getElementById('result');
const statsEl = document.getElementById('stats');

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const s = await r.json();
    const ok = s.ok || 0;
    const archived = s.archived || 0;
    statsEl.textContent = `${ok.toLocaleString()} active · ${archived.toLocaleString()} archived · ${s.total.toLocaleString()} total`;
  } catch (e) {
    statsEl.textContent = '';
  }
}
loadStats();

function useExample(btn) {
  questionEl.value = btn.textContent;
  questionEl.focus();
}

function escapeHTML(s) {
  return (s ?? '').toString()
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderCitation(c) {
  const tags = (c.tags || []).map(t => `<span class="tag">${escapeHTML(t)}</span>`).join(' ');
  const archived = c.archived ? `<span class="archived-badge">archived</span>` : '';
  const folder = c.folder ? `<span>${escapeHTML(c.folder)}</span>` : '';
  return `
    <div class="card">
      <div class="card-title">
        <span class="card-id">[${c.id}]</span>
        <a href="${escapeHTML(c.url)}" target="_blank" rel="noopener" data-id="${c.id}">${escapeHTML(c.title || '(untitled)')}</a>
        ${archived}
      </div>
      ${c.summary ? `<div class="card-summary">${escapeHTML(c.summary)}</div>` : ''}
      ${c.why_saved ? `<div class="card-why">${escapeHTML(c.why_saved)}</div>` : ''}
      <div class="card-meta">
        ${folder}
        ${tags}
      </div>
    </div>`;
}

async function touch(bookmarkId) {
  try {
    await fetch('/api/touch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bookmark_id: bookmarkId })
    });
  } catch (e) {}
}

resultEl.addEventListener('click', (e) => {
  const a = e.target.closest('a[data-id]');
  if (a) {
    const id = parseInt(a.getAttribute('data-id'), 10);
    if (id) touch(id);
  }
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const q = questionEl.value.trim();
  if (!q) return;
  submitBtn.disabled = true;
  resultEl.innerHTML = '<div class="loading">Thinking…</div>';

  try {
    const r = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, include_archived: includeArchivedEl.checked })
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      resultEl.innerHTML = `<div class="empty">Error: ${escapeHTML(err.detail || r.statusText)}</div>`;
      return;
    }
    const data = await r.json();
    const citationsHTML = (data.citations || []).map(renderCitation).join('');
    const answerSection = data.answer
      ? `<div class="answer-box">${escapeHTML(data.answer)}<div class="answer-meta">Considered ${data.candidates_considered || 0} candidates · ${(data.citations || []).length} cited</div></div>`
      : '';
    const citationsSection = (data.citations || []).length
      ? `<div class="citations"><h2>Citations</h2>${citationsHTML}</div>`
      : '<div class="empty">No bookmarks matched.</div>';
    resultEl.innerHTML = answerSection + citationsSection;
  } catch (e) {
    resultEl.innerHTML = `<div class="empty">Error: ${escapeHTML(e.message)}</div>`;
  } finally {
    submitBtn.disabled = false;
    loadStats();
  }
});

questionEl.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') form.requestSubmit();
});
</script>
</body>
</html>
